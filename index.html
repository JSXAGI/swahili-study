<style>
    :root {
      --bg-image: url('https://raw.githubusercontent.com/JSXAGI/swahili-study/main/swahili.jpg');
      --bg-color: #fef3c7;
      --surface-color: rgba(255, 255, 255, 0.8);
      --text-color: #1e293b;
      --primary-color: #f59e0b;
      --secondary-color: #8b5cf6;
      --accent-color: #10b981;
      --header-height: 100px;
    }  
      * { box-sizing: border-box; font-family: 'Segoe UI', Meiryo, sans-serif; }
      body, html { 
      margin: 0; 
      padding: 0; 
      min-height: 100vh;
      background-color: var(--bg-color);
      background-image: var(--bg-image);
      background-size: cover;
      background-position: left 20% center !important;
      background-attachment: fixed; 
      background-repeat: no-repeat;
      color: var(--text-color); 
      overflow-x: hidden; 
      }
      .app-header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-height);
      background-color: #ffffff00; display: flex; align-items: center; padding: 0 0px;      
      z-index: 1000;
      }
      .home-link {
      pointer-events: auto;
      position: absolute !important;
      left: 20px !important;
      top: 15px !important;
      background: white; color: var(--primary-color); padding: 3px 3px; border-radius: 5px;
      font-weight: bold; font-size: 2rem; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
      }
      .main-content { 
      margin-top: calc(var(--header-height) + 20px); 
      padding: 20px; 
      max-width: 800px; 
      margin-left: auto;
      margin-right: auto;
      }
      .card { background: var(--surface-color); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px solid #fff; margin-bottom: 20px; }
      .level-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
      .btn-lvl { padding: 10px; border-radius: 12px; border: 3px solid #cbd5e1; font-weight: bold; cursor: pointer; background: #f1f5f9; }
      .btn-lvl.active { border-color: var(--primary-color); background: white; color: var(--primary-color); transform: scale(1.05); }
      .btn { cursor: pointer; border: none; border-radius: 12px; padding: 10px; font-weight: bold; font-size: 1.1rem; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
      .btn-primary { background-color: var(--primary-color); color: white; width: 100%; }
      .lang-row { background: #f8fafc; padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
      .lang-label { font-size: 0.75rem; color: #64748b; font-weight: bold; }
      .lang-text { font-size: 1.6rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
      .btn-speak { background: #e2e8f0; border: none; padding: 12px 16px !important; border-radius: 8px; cursor: pointer; font-size: 1.4rem !important; }
      .hidden { display: none; }
      .text-center { text-align: center; }
      .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; background: var(--secondary-color); color: white; margin: 2px; display: inline-block; }
      
      .btn:hover, .btn-speak:hover { background-color: #ff9800 !important; color: white !important; transform: scale(1.1); transition: 0.2s; }

      /* --- 文法タイトルの装飾 --- */
      #grammar-list .card div[style*="font-size:0.9rem"],
      #grammar-list .card div[style*="font-size: 0.9rem"] {
        font-size: 1.1rem !important;
        color: #ffffff !important;
        background-color: var(--secondary-color) !important;
        display: inline-block !important;
        padding: 4px 12px !important;
        border-radius: 8px !important;
        margin-bottom: 12px !important;
        font-weight: bold !important;
      }

      /* --- スマホ専用デザイン（一画面に収めるダイエット版） --- */
      @media screen and (max-width: 600px) {
        .main-content { 
          margin-top: 105px !important; 
          padding: 10px 5px !important; 
        }
        .level-selector { 
          display: flex !important; 
          flex-direction: column !important; 
          gap: 6px !important; 
        }
        .btn-lvl { 
          height: auto !important; 
          min-height: 44px !important; 
          padding: 8px !important;
          font-size: 1.1rem !important; 
        }
        #home-view .btn-primary {
          width: 48% !important;
          height: 75px !important;
          font-size: 1.0rem !important;
          padding: 5px !important;
        }
        /* 単語・文法ボタンを横に並べるための親要素調整 */
        #home-view div[style*="display: grid"] {
          display: flex !important;
          flex-direction: row !important;
          gap: 10px !important;
        }
        .card { 
          padding: 15px !important; 
          margin-bottom: 10px !important; 
          width: 96% !important;
          margin-left: auto !important;
          margin-right: auto !important;
        }
        h2 { font-size: 1.2rem !important; margin-top: 5px !important; }
        
        button { -webkit-tap-highlight-color: transparent; }

        .lang-text { font-size: 1.3rem !important; }
      }

      /* --- 超小型スマホ用の微調整 --- */
      @media screen and (max-width: 380px) {
        .main-content { margin-top: 95px !important; }
        #home-view .btn-primary { height: 65px !important; }
        .btn-lvl { min-height: 40px !important; }
      }
   </style>

<body>
   <header class="app-header">
      <button class="home-link" onclick="showView('home')">
      🏠
      </button>

   </header>

   <main class="main-content">
      <div id="home-view">
         <div class="card text-center">
            <h2>1. Level / レベル選択</h2>
            <div class="level-selector">
               <button class="btn-lvl active" id="lvl-Beginner" onclick="setLevel('Beginner')">初級 Beginner<br>Kids / Basic</button>
               <button class="btn-lvl" id="lvl-Intermediate" onclick="setLevel('Intermediate')">中級 Intermediate<br>Junior High</button>
               <button class="btn-lvl" id="lvl-Advanced" onclick="setLevel('Advanced')">上級 Advanced<br>Senior High+</button>
            </div>
         </div>
         <div class="card text-center">
            <h2>2. Activity / 学習内容</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
               <button class="btn btn-primary" onclick="showView('vocabulary')">📚 Words<br>単語</button>
               <button class="btn btn-primary" style="background-color: var(--secondary-color);" onclick="showView('grammar-choice')">✏️ Grammar<br>文法</button>
            </div>
         </div>
      </div>

      <div id="vocabulary-view" class="hidden">
         <div class="card text-center">
            <div><span class="badge" id="v-lvl-badge"></span><span class="badge" id="v-cat-badge" style="background:var(--accent-color)"></span></div>
            <div id="v-emoji" style="font-size: 5rem; margin: 0px 0;"></div>
            <div class="lang-row">
               <div class="lang-label">Kiswahili</div>
               <div class="lang-text"><span id="v-sw"></span><button class="btn-speak" onclick="speak('sw')">🔊</button></div>
            </div>
            <div class="lang-row">
               <div class="lang-label">English</div>
               <div class="lang-text"><span id="v-en"></span><button class="btn-speak" onclick="speak('en')">🔊</button></div>
            </div>
            <div class="lang-row">
               <div class="lang-label">日本語</div>
               <div class="lang-text"><span id="v-ja"></span><button class="btn-speak" onclick="speak('ja')">🔊</button></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 5px;">
               <button class="btn" style="background: #e2e8f0;" onclick="changeWord(-1)">◀ BACK</button>
               <button class="btn btn-primary" onclick="changeWord(1)">NEXT ▶</button>
            </div>
         </div>
      </div>

      <div id="grammar-choice-view" class="hidden">
    <div class="card text-center">
        <h2 style="margin-bottom: 5px;">文法レベルを選んでください</h2>
        <div style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">Select your grammar level</div>

        <div style="display: grid; gap: 10px;">
            <button class="btn btn-primary" onclick="setLevel('Beginner'); showView('grammar')">Beginner 初級文法</button>
            
            <button class="btn" style="background-color: var(--accent-color); color: white;" onclick="setLevel('Intermediate'); showView('grammar')">Intermediate 中級文法</button>
            
            <button class="btn" style="background-color: var(--secondary-color); color: white;" onclick="setLevel('Advanced'); showView('grammar')">Advanced 上級文法</button>
        </div>
        
        <button class="btn" style="margin-top: 20px; background: #e2e8f0;" onclick="showView('home')">戻る / Back</button>
    </div>
</div>

      <div id="grammar-view" class="hidden">
         <div class="text-center" style="margin-bottom: 15px;">
            <span class="badge" id="g-lvl-badge"></span>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
               <button class="btn" style="padding: 5px 15px; background: #e2e8f0;" onclick="showView('grammar-choice')">← 戻る</button>
               <span class="badge" id="g-lvl-badge"></span>
            </div>
         </div>
         <div id="grammar-list"></div>
      </div>
   </main>

        { title: "完了直後の表現 (Just)", sw_phrase: "Nimetoka kula.", en_phrase: "I have just eaten.", ja_trans: "今、食べたばかりです。", ja_explanation: "toka は「〜したばかり」です。", level: "Intermediate" },
        { title: "継続の表現 (Continue)", sw_phrase: "Endelea kusoma.", en_phrase: "Keep reading.", ja_trans: "読み続けてください。", ja_explanation: "endelea は「続ける」です。", level: "Intermediate" },

        { title: "〜の後に (After)", sw_phrase: "Baada ya kazi, nitaenda nyumbani.", en_phrase: "After work, I will go home.", ja_trans: "仕事の後、家に帰ります。", ja_explanation: "baada ya は「〜の後」です。", level: "Intermediate" },
        { title: "一緒の表現 (With)", sw_phrase: "Njoo pamoja nami.", en_phrase: "Come together with me.", ja_trans: "私と一緒に来てください。", ja_explanation: "pamoja na は「〜と共に」です。", level: "Intermediate" },
        { title: "欠如の表現 (Without)", sw_phrase: "Chai bila sukari.", en_phrase: "Tea without sugar.", ja_trans: "砂糖なしの紅茶。", ja_explanation: "bila は「〜なしで」です。", level: "Intermediate" },
        { title: "習慣の表現 (Used to)", sw_phrase: "Yeye husoma kila siku.", en_phrase: "He usually reads every day.", ja_trans: "彼は毎日読書をする習慣があります。", ja_explanation: "hu- は習慣を表します。", level: "Intermediate" },

        { title: "〜のために (For)", sw_phrase: "Hii ni kwa ajili yako.", en_phrase: "This is for you.", ja_trans: "これはあなたのためです。", ja_explanation: "kwa ajili ya は「〜のために」です。", level: "Intermediate" },
        { title: "関係代名詞・人 (Who)", sw_phrase: "Mtu anayesoma...", en_phrase: "The person who is reading...", ja_trans: "本を読んでいる人は...", ja_explanation: "anayesoma は「読んでいる（人）」です。", level: "Intermediate" },
        { title: "関係代名詞・物 (Which)", sw_phrase: "Kitu ninachopenda.", en_phrase: "The thing which I like.", ja_trans: "私が好きな物。", ja_explanation: "ninachopenda は「好きな（物）」です。", level: "Intermediate" },
        { title: "場所の限定 (Where)", sw_phrase: "Pale ninapoishi.", en_phrase: "The place where I live.", ja_trans: "私が住んでいる場所。", ja_explanation: "ninapoishi は「住んでいる（場所）」です。", level: "Intermediate" },
        { title: "推量の表現 (Maybe)", sw_phrase: "Labda nitakuja kesho.", en_phrase: "Maybe I will come tomorrow.", ja_trans: "たぶん明日行きます。", ja_explanation: "labda は「たぶん」です。", level: "Intermediate" },
        { title: "確信の表現 (Certainly)", sw_phrase: "Kwa hakika!", en_phrase: "Certainly!", ja_trans: "その通り！ / 確かに！", ja_explanation: "hakika は強い確信です。", level: "Intermediate" },
        { title: "同一の表現 (Same)", sw_phrase: "Hii ni sawa na ile.", en_phrase: "This is the same as that.", ja_trans: "これはあれと同じです。", ja_explanation: "sawa na は「同じ」です。", level: "Intermediate" },
        { title: "相違の表現 (Different)", sw_phrase: "Hii ni tofauti kabisa.", en_phrase: "This is completely different.", ja_trans: "これは全く違います。", ja_explanation: "tofauti は「違う」です。", level: "Intermediate" },
        { title: "義務の表現 (Must)", sw_phrase: "Lazima niende sasa.", en_phrase: "I must go now.", ja_trans: "もう行かなければなりません。", ja_explanation: "lazima は「〜しなければならない」です。", level: "Intermediate" },
      
        // --- 上級：Advanced (20件) ---
        { title: "推測の表現", sw_phrase: "Inaonekana kuwa mvua itanyesha.", en_phrase: "It seems that it will rain.", ja_trans: "雨が降りそうです。", ja_explanation: "推測を表します。", level: "Advanced" },
        { title: "後悔の表現", sw_phrase: "Ningalijua, nisingalikuja.", en_phrase: "If I had known, I would not have come.", ja_trans: "もし知っていたら...", ja_explanation: "仮定法です。", level: "Advanced" },
        { title: "驚きの表現", sw_phrase: "Kumbe! Kumbe ameshafika!", en_phrase: "Oh! So he has already arrived!", ja_trans: "へぇー！彼はもう着いてたんだ！", ja_explanation: "意外な事実を知った時の感動詞です。", level: "Advanced" },
        { title: "ことわざ：急がば回れ", sw_phrase: "Haraka haraka haina baraka.", en_phrase: "Hurry hurry has no blessing.", ja_trans: "急がば回れ。", ja_explanation: "スワヒリ語の代表的な教訓です。", level: "Advanced" },
        { title: "ことわざ：忍耐は勝利", sw_phrase: "Subira huvuta heri.", en_phrase: "Patience brings happiness.", ja_trans: "待てば海路の日和あり。", ja_explanation: "忍耐が幸運を引き寄せます。", level: "Advanced" },
        { title: "〜のようである", sw_phrase: "Yeye ni kama kaka yangu.", en_phrase: "He is like my brother.", ja_trans: "彼は私の兄のようです。", ja_explanation: "比喩の表現です。", level: "Advanced" },
        { title: "可能性の表現", sw_phrase: "Yawezekana atakuja leo.", en_phrase: "It is possible he will come today.", ja_trans: "今日、彼は来る可能性があります。", ja_explanation: "可能性を表します。", level: "Advanced" },
        { title: "〜せざるを得ない", sw_phrase: "Sina budi kwenda.", en_phrase: "I have no choice but to go.", ja_trans: "行かざるを得ません。", ja_explanation: "強い義務感です。", level: "Advanced" },
        { title: "相互の動作", sw_phrase: "Wanasumbuliana sana.", en_phrase: "They are bothering each other a lot.", ja_trans: "お互いに困らせ合っています。", ja_explanation: "「お互いに〜する」です。", level: "Advanced" },
        { title: "使役の表現", sw_phrase: "Mwalimu alinisomesha.", en_phrase: "The teacher made me study.", ja_trans: "先生に勉強させてもらいました。", ja_explanation: "「〜させる」という使役です。", level: "Advanced" },
        { title: "受動態の表現", sw_phrase: "Chakula kimepikwa.", en_phrase: "The food has been cooked.", ja_trans: "料理が作られました。", ja_explanation: "「〜される」という受身です。", level: "Advanced" },
        { title: "強調の表現", sw_phrase: "Nilimwambia kabisa!", en_phrase: "I told him clearly!", ja_trans: "彼にはっきりと言いました！", ja_explanation: "「完全に/全く」と強調します。", level: "Advanced" },

        { title: "いつの間にか", sw_phrase: "Ghafla, akaanguka.", en_phrase: "Suddenly, he fell.", ja_trans: "突然、彼は転びました。", ja_explanation: "急な出来事です。", level: "Advanced" },
        { title: "〜さえあれば", sw_phrase: "Iradi tu uwe na furaha.", en_phrase: "As long as you are happy.", ja_trans: "幸せでさえあれば...", ja_explanation: "条件の限定です。", level: "Advanced" },
        { title: "それぞれの表現", sw_phrase: "Kila mmoja ana kitabu.", en_phrase: "Each one has a book.", ja_trans: "それぞれが本を持っています。", ja_explanation: "「各自」を指します。", level: "Advanced" },
        { title: "ほぼ・大体", sw_phrase: "Kazi imekaribia kwisha.", en_phrase: "The work is almost finished.", ja_trans: "仕事はほぼ終わりました。", ja_explanation: "完了に近い状態です。", level: "Advanced" },
        { title: "〜以来", sw_phrase: "Tangu mwaka jana...", en_phrase: "Since last year...", ja_trans: "昨年以来...", ja_explanation: "起点を表します。", level: "Advanced" },
        { title: "決して〜ない", sw_phrase: "Sitafanya hivyo kamwe.", en_phrase: "I will never do that.", ja_trans: "決してそんなことはしません。", ja_explanation: "強い否定です。", level: "Advanced" },
        { title: "お別れの挨拶（長期）", sw_phrase: "Kwa heri ya kuonana!", en_phrase: "Goodbye, until we meet again!", ja_trans: "さようなら、また会う日まで！", ja_explanation: "丁寧な別れの言葉です。", level: "Advanced" },
		];

      let currentLevel = 'Beginner';
      let vIndex = 0;

      function setLevel(lvl) {
         currentLevel = lvl;
         document.querySelectorAll('.btn-lvl').forEach(b => b.classList.remove('active'));
         const targetBtn = document.getElementById('lvl-' + lvl);
         if(targetBtn) targetBtn.classList.add('active');
         
         vIndex = 0;
         if(!document.getElementById('vocabulary-view').classList.contains('hidden')) updateWord();
         if(!document.getElementById('grammar-view').classList.contains('hidden')) renderGrammar();
      }

      function showView(id) {
         ['home', 'vocabulary', 'grammar-choice', 'grammar'].forEach(v => {
            document.getElementById(v + '-view').classList.add('hidden');
         });
         document.getElementById(id + '-view').classList.remove('hidden');

         if(id === 'vocabulary') {
            vIndex = 0;
            updateWord();
         }
         if(id === 'grammar') {
            renderGrammar();
         }
      }

      function updateWord() {
         const list = vocabularyData.filter(d => d.level === currentLevel);
         if(list.length === 0) return;
         const d = list[vIndex];
         document.getElementById('v-lvl-badge').innerText = currentLevel;
         document.getElementById('v-cat-badge').innerText = d.category;
         document.getElementById('v-emoji').innerText = d.emoji;
         document.getElementById('v-sw').innerText = d.sw;
         document.getElementById('v-en').innerText = d.en;
         document.getElementById('v-ja').innerText = d.ja;
      }

      function changeWord(step) {
         const list = vocabularyData.filter(d => d.level === currentLevel);
         vIndex = (vIndex + step + list.length) % list.length;
         updateWord();
      }

      function renderGrammar() {
         const area = document.getElementById('grammar-list');
         area.innerHTML = '';
         document.getElementById('g-lvl-badge').innerText = currentLevel;

         grammarData.filter(d => d.level === currentLevel).forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
               <div style="font-size:0.9rem; font-weight:bold; color:var(--secondary-color); margin-bottom:10px;">${item.title}</div>
               <div class="lang-row">
                  <div class="lang-label">Kiswahili</div>
                  <div class="lang-text"><span id="g-sw-${i}">${item.sw_phrase}</span><button class="btn-speak" onclick="speakGrammar('g-sw-${i}','sw')">🔊</button></div>
               </div>
               <div class="lang-row">
                  <div class="lang-label">English</div>
                  <div class="lang-text"><span id="g-en-${i}">${item.en_phrase}</span><button class="btn-speak" onclick="speakGrammar('g-en-${i}','en')">🔊</button></div>
               </div>
               <div class="lang-row">
                  <div class="lang-label">日本語</div>
                  <div class="lang-text"><span id="g-ja-${i}">${item.ja_trans}</span><button class="btn-speak" onclick="speakGrammar('g-ja-${i}','ja')">🔊</button></div>
               </div>
               <div style="font-size:0.9rem; margin-top:10px; color:#555;">${item.ja_explanation}</div>
            `;
            area.appendChild(div);
         });
      }

      function speak(lang) {
         const text = document.getElementById('v-' + lang).innerText;
         window.speechSynthesis.cancel();
         const u = new SpeechSynthesisUtterance(text);
         u.lang = (lang==='en')?'en-US':(lang==='ja')?'ja-JP':'sw-KE';
         window.speechSynthesis.speak(u);
      }

      function speakGrammar(id, lang) {
         const text = document.getElementById(id).innerText;
         window.speechSynthesis.cancel();
         const u = new SpeechSynthesisUtterance(text);
         u.lang = (lang==='en')?'en-US':(lang==='ja')?'ja-JP':'sw-KE';
         window.speechSynthesis.speak(u);
      }
   </script>
