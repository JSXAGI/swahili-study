   <title>スワヒリ語学習</title>
<style>
    :root {
      --bg-image: url('https://raw.githubusercontent.com/JSXAGI/swahili-study/main/swahili.jpg');
      --bg-color: #fef3c7;
      --surface-color: rgba(255, 255, 255, 0.8);
      --text-color: #1e293b;
      --primary-color: #f59e0b;
      --secondary-color: #8b5cf6;
      --accent-color: #10b981;
      --header-height: 100px;
    }  
      * { box-sizing: border-box; font-family: 'Segoe UI', Meiryo, sans-serif; }
      body, html { 
      margin: 0; 
      padding: 0; 
      min-height: 100vh;
      background-color: var(--bg-color);
      background-image: var(--bg-image);
      background-size: cover;
      background-position: left 20% center !important;
      background-attachment: fixed; 
      background-repeat: no-repeat;
      color: var(--text-color); 
      overflow-x: hidden; 
      }
      .app-header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-height);
      background-color: #ffffff00; display: flex; align-items: center; padding: 0 0px;      
      z-index: 1000;
      }
      .home-link {
      pointer-events: auto;
      position: absolute !important;
      left: 20px !important;
      top: 15px !important;
      background: white; color: var(--primary-color); padding: 3px 3px; border-radius: 5px;
      font-weight: bold; font-size: 2rem; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
      }
      .main-content { 
      margin-top: calc(var(--header-height) + 20px); 
      padding: 20px; 
      max-width: 800px; 
      margin-left: auto;
      margin-right: auto;
      }
      .card { background: var(--surface-color); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px solid #fff; margin-bottom: 20px; }
      .level-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
      .btn-lvl { padding: 10px; border-radius: 12px; border: 3px solid #cbd5e1; font-weight: bold; cursor: pointer; background: #f1f5f9; }
      .btn-lvl.active { border-color: var(--primary-color); background: white; color: var(--primary-color); transform: scale(1.05); }
      .btn { cursor: pointer; border: none; border-radius: 12px; padding: 10px; font-weight: bold; font-size: 1.1rem; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
      .btn-primary { background-color: var(--primary-color); color: white; width: 100%; }
      .lang-row { background: #f8fafc; padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
      .lang-label { font-size: 0.75rem; color: #64748b; font-weight: bold; }
      .lang-text { font-size: 1.6rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
      .btn-speak { background: #e2e8f0; border: none; padding: 12px 16px !important; border-radius: 8px; cursor: pointer; font-size: 1.4rem !important; }
      .hidden { display: none; }
      .text-center { text-align: center; }
      .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; background: var(--secondary-color); color: white; margin: 2px; display: inline-block; }
      
      .btn:hover, .btn-speak:hover { background-color: #ff9800 !important; color: white !important; transform: scale(1.1); transition: 0.2s; }

      /* --- 文法タイトルの装飾 --- */
      #grammar-list .card div[style*="font-size:0.9rem"],
      #grammar-list .card div[style*="font-size: 0.9rem"] {
        font-size: 1.1rem !important;
        color: #ffffff !important;
        background-color: var(--secondary-color) !important;
        display: inline-block !important;
        padding: 4px 12px !important;
        border-radius: 8px !important;
        margin-bottom: 12px !important;
        font-weight: bold !important;
      }

      /* --- スマホ専用デザイン（一画面に収めるダイエット版） --- */
      @media screen and (max-width: 600px) {
        .main-content { 
          margin-top: 105px !important; 
          padding: 10px 5px !important; 
        }
        .level-selector { 
          display: flex !important; 
          flex-direction: column !important; 
          gap: 6px !important; 
        }
        .btn-lvl { 
          width: auto !important; 
          height: auto !important; 
          min-height: 44px !important; 
          padding: 8px !important;
          font-size: 1.1rem !important; 
        }
		
        #home-view .btn-primary {
          width: 48% !important;
          height: 75px !important;
          font-size: 1.0rem !important;
          padding: 5px !important;
        }
        /* 単語・文法ボタンを横に並べるための親要素調整 */
        #home-view div[style*="display: grid"] {
          display: flex !important;
          flex-direction: row !important;
          gap: 10px !important;
        }
        .card { 
          padding: 15px !important; 
          margin-bottom: 10px !important; 
          width: 96% !important;
          margin-left: auto !important;
          margin-right: auto !important;
        }
        h2 { font-size: 1.2rem !important; margin-top: 5px !important; }
        
        button { -webkit-tap-highlight-color: transparent; }

        .lang-text { font-size: 1.3rem !important; }
      }

      /* --- 超小型スマホ用の微調整 --- */
      @media screen and (max-width: 380px) {
        .main-content { margin-top: 95px !important; }
        #home-view .btn-primary { height: 65px !important; }
        .btn-lvl { min-height: 40px !important; }
      }
   </style>
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
<header class="app-header">
  <button class="home-link" onclick="showView('home')">🏠</button>
  <div style="flex-grow: 1; text-align: center; color: #f59e0b; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-weight: bold; font-size: 2rem;" id="mode-title">スワヒリ語学習</div>
  <a href="en.html" style="position: absolute; right: 15px; background: rgba(255,255,255,0.2); color: white; padding: 5px 10px; border-radius: 20px; text-decoration: none; font-size: 0.8rem; border: 1px solid white;">EN Mode</a>
</header>

   <main class="main-content">
      <div id="home-view">
         <div class="card text-center">
            <h2>1. レベル選択</h2>
            <div class="level-selector">
               <button class="btn-lvl active" id="lvl-Beginner" onclick="setLevel('Beginner')">初級<br>キッズ・基本単語</button>
               <button class="btn-lvl" id="lvl-Intermediate" onclick="setLevel('Intermediate')">中級<br>日常会話・中学レベル</button>
               <button class="btn-lvl" id="lvl-Advanced" onclick="setLevel('Advanced')">上級<br>応用・高校以上</button>
            </div>
         </div>
         <div class="card text-center">
            <h2>2. 学習内容を選ぶ</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
               <button class="btn btn-primary" onclick="showView('vocabulary')">📚 単語カード</button>
               <button class="btn btn-primary" style="background-color: var(--secondary-color);" onclick="showView('grammar-choice')">✏️ スワヒリ語文法</button>
            </div>
         </div>
      </div>

      <div id="vocabulary-view" class="hidden">
         <div class="card text-center">
            <div><span class="badge" id="v-lvl-badge"></span><span class="badge" id="v-cat-badge" style="background:var(--accent-color)"></span></div>
            <div id="v-emoji" style="font-size: 5rem; margin: 0px 0;"></div>
            <div class="lang-row">
               <div class="lang-label">Kiswahili</div>
               <div class="lang-text"><span id="v-sw"></span><button class="btn-speak" onclick="speak('sw')">🔊</button></div>
            </div>
            <div class="lang-row">
               <div class="lang-label">English</div>
               <div class="lang-text"><span id="v-en"></span><button class="btn-speak" onclick="speak('en')">🔊</button></div>
            </div>
            <div class="lang-row">
               <div class="lang-label">日本語</div>
               <div class="lang-text"><span id="v-ja"></span><button class="btn-speak" onclick="speak('ja')">🔊</button></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 5px;">
               <button class="btn" style="background: #e2e8f0;" onclick="changeWord(-1)">◀ BACK</button>
               <button class="btn btn-primary" onclick="changeWord(1)">NEXT ▶</button>
            </div>
			<button class="btn" style="width: 90%; margin: 10px auto; padding: 8px; font-size: 14px; background: #ff9800; color: white; display: block;" onclick="shuffleVocab()">🔀 単語をシャッフル</button>
         </div>
      </div>

      <div id="grammar-choice-view" class="hidden">
    <div class="card text-center">
        <h2 style="margin-bottom: 5px;">文法レベルを選んでください</h2>
        <div style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px;">Select your grammar level</div>

        <div style="display: grid; gap: 10px;">
            <button class="btn btn-primary" onclick="setLevel('Beginner'); showView('grammar')">Beginner 初級文法</button>
            
            <button class="btn" style="background-color: var(--accent-color); color: white;" onclick="setLevel('Intermediate'); showView('grammar')">Intermediate 中級文法</button>
            
            <button class="btn" style="background-color: var(--secondary-color); color: white;" onclick="setLevel('Advanced'); showView('grammar')">Advanced 上級文法</button>
        </div>
        
        <button class="btn" style="margin-top: 20px; background: #e2e8f0;" onclick="showView('home')">戻る</button>
    </div>
</div>

      <div id="grammar-view" class="hidden">
         <div class="text-center" style="margin-bottom: 15px;">
            <span class="badge" id="g-lvl-badge"></span>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
               <button class="btn" style="padding: 5px 15px; background: #e2e8f0;" onclick="showView('grammar-choice')">← 戻る</button>
               <span class="badge" id="g-lvl-badge"></span>
            </div>
         </div>
         <div id="grammar-list"></div>
      </div>
   </main>
   
<div id="game-container" style="text-align: center; padding: 10px; border: 2px solid #555; border-radius: 10px; background-color: #f9f9f9; margin: 15px auto; width: 95%; max-width: 600px; font-size: 14px; box-sizing: border-box;">
    <h3 style="margin: 5px 0;">🦁 スワヒリ・クエスト</h3>
    
    <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 8px;">
        <button onclick="setLevel('Beginner')" class="btn-lvl" id="game-lvl-Beginner" style="font-size: 10px; padding: 3px 8px; cursor: pointer;">初級</button>
        <button onclick="setLevel('Intermediate')" class="btn-lvl" id="game-lvl-Intermediate" style="font-size: 10px; padding: 3px 8px; cursor: pointer;">中級</button>
        <button onclick="setLevel('Advanced')" class="btn-lvl" id="game-lvl-Advanced" style="font-size: 10px; padding: 3px 8px; cursor: pointer;">上級</button>
    </div>

    <div id="status-bar" style="margin-bottom: 5px; font-weight: bold; font-size: 12px;">
        <span>Score: <span id="score">0</span></span> | 
        <span>Hint: <span id="hint-count">1</span></span> | 
        <span>Rank: <span id="rank">駆け出し</span></span>
    </div>
    
    <div id="question-area" style="font-size: 18px; margin: 10px 0; min-height: 45px; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 5px; padding: 5px; border: 1px solid #ddd;">
        「スタート」をタップ！
    </div>

    <div id="answer-area" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;"></div>

    <div style="display: flex; gap: 10px;">
        <button id="hint-btn" onclick="useHint()" style="display:none; flex: 1; padding: 10px; background: #ff9800; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">💡 ヒント</button>
        <button id="start-btn" onclick="startNewGame()" style="flex: 2; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">クエスト開始！</button>
    </div>
</div>

// --- ゲーム管理変数 ---
let currentScore = 0;
let comboCount = 0;
let canUseHint = true;
let currentCorrectAnswer = "";

function startNewGame() {
    document.getElementById('start-btn').style.display = 'none'; 
    document.getElementById('hint-btn').style.display = 'block';
    comboCount = 0;
    nextQuestion();
}

function nextQuestion() {
    document.getElementById('game-container').style.backgroundColor = "#f9f9f9";
    canUseHint = true; 
    document.getElementById('hint-btn').disabled = false;
    document.getElementById('hint-btn').style.opacity = "1";
    document.getElementById('hint-count').innerText = "1";

    // ★修正ポイント：今選んでいるレベルの単語だけを抽出！
    // currentLevel は既存のコードで管理されている変数です
    const levelFilteredData = vocabularyData.filter(v => v.level === currentLevel);
    
    // もしそのレベルにデータがなければ全データから（エラー防止）
    const targetData = levelFilteredData.length > 0 ? levelFilteredData : vocabularyData;

    const randomIndex = Math.floor(Math.random() * targetData.length);
    const question = targetData[randomIndex];
    currentCorrectAnswer = question.sw;
    
    let comboText = comboCount > 0 ? `<div style="color: #ff5722; font-size: 14px; font-weight: bold;">🔥 ${comboCount} JAMBO!</div>` : "";
    document.getElementById('question-area').innerHTML = `
        <div style="font-size: 12px; color: #666;">Level: ${currentLevel}</div>
        ${comboText}
        スワヒリ語で <b>「${question.ja}」</b> は？
    `;

    const choices = [question.sw];
    while (choices.length < 4) {
        const wrongSw = vocabularyData[Math.floor(Math.random() * vocabularyData.length)].sw;
        if (!choices.includes(wrongSw)) choices.push(wrongSw);
    }
    choices.sort(() => Math.random() - 0.5);

    const answerArea = document.getElementById('answer-area');
    answerArea.innerHTML = ''; 
    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.innerText = choice;
        btn.style.cssText = "padding: 12px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: white;";
        btn.onclick = () => checkAnswer(choice, question.sw);
        answerArea.appendChild(btn);
    });
}

// --- checkAnswer と updateRank は前回のままでOKですが、
// --- 念のためセットで置いておきますね。

function checkAnswer(selected, correct) {
    const buttons = document.getElementById('answer-area').getElementsByTagName('button');
    for (let btn of buttons) { btn.disabled = true; }

    if (selected === correct) {
        document.getElementById('game-container').style.backgroundColor = "#d4edda"; 
        comboCount++;
        let bonus = comboCount >= 3 ? 20 : 10;
        currentScore += bonus;
        document.getElementById('score').innerText = currentScore;
        updateRank();
        setTimeout(nextQuestion, 600);
    } else {
        document.getElementById('game-container').style.backgroundColor = "#f8d7da"; 
        document.getElementById('question-area').innerHTML = `😢 正解は <b>${correct}</b>`;
        comboCount = 0;
        setTimeout(nextQuestion, 1500);
    }
}

function useHint() {
    if (!canUseHint) return; // すでに使っていたら何もしない

    // 今の問題のスワヒリ語（答え）を一時的に取得
    const originalContent = document.getElementById('question-area').innerHTML;
    
    // ヒント：答えを一瞬だけ表示する
    document.getElementById('question-area').innerHTML = `
        <div style="color: #ff9800; font-weight: bold; font-size: 16px;">
            💡 答えは: ${currentCorrectAnswer}
        </div>
    `;

    // 1.5秒後に元の表示（問題文）に戻す
    setTimeout(() => {
        document.getElementById('question-area').innerHTML = originalContent;
    }, 1500);

    // ヒントの使用権を消費
    canUseHint = false;
    document.getElementById('hint-btn').disabled = true;
    document.getElementById('hint-btn').style.opacity = "0.5";
    document.getElementById('hint-count').innerText = "0";
}
function updateRank() {
    let rankName = "駆け出し";
    if (currentScore >= 50) rankName = "案内人";
    if (currentScore >= 150) rankName = "マスター";
    if (currentScore >= 300) rankName = "東アフリカの賢者";
    document.getElementById('rank').innerText = rankName;
}

      let currentLevel = 'Beginner';
      let vIndex = 0;

 function setLevel(lvl) {
    currentLevel = lvl;
    
    // 1. 既存のメインボタンの見た目を更新（activeクラスの付け替え）
    document.querySelectorAll('.btn-lvl').forEach(b => b.classList.remove('active'));
    const targetBtn = document.getElementById('lvl-' + lvl);
    if(targetBtn) targetBtn.classList.add('active');

    // 2. ゲーム内ボタンの見た目も更新（色を変えて今どこか分かりやすくする）
    ['Beginner', 'Intermediate', 'Advanced'].forEach(l => {
        const gBtn = document.getElementById('game-lvl-' + l);
        if(gBtn) {
            // 今選んだレベルなら緑色、それ以外はグレーに
            gBtn.style.background = (l === lvl) ? "#45a049" : "#e2e8f0";
            gBtn.style.color = (l === lvl) ? "white" : "black";
            gBtn.style.border = "none";
            gBtn.style.borderRadius = "3px";
        }
    });

    vIndex = 0;
    
    // ★ゲーム中にレベルを変えたら、即座に次の問題を出す（レベル反映のため）
    const startBtn = document.getElementById('start-btn');
    if(startBtn && startBtn.style.display === 'none') {
        nextQuestion();
    }

    if(!document.getElementById('vocabulary-view').classList.contains('hidden')) updateWord();
    if(!document.getElementById('grammar-view').classList.contains('hidden')) renderGrammar();
}

      function showView(id) {
         ['home', 'vocabulary', 'grammar-choice', 'grammar'].forEach(v => {
            document.getElementById(v + '-view').classList.add('hidden');
         });
         document.getElementById(id + '-view').classList.remove('hidden');

         if(id === 'vocabulary') {
            vIndex = 0;
            updateWord();
         }
         if(id === 'grammar') {
            renderGrammar();
         }
      }

      function updateWord() {
         const list = vocabularyData.filter(d => d.level === currentLevel);
         if(list.length === 0) return;
         const d = list[vIndex];
         document.getElementById('v-lvl-badge').innerText = currentLevel;
         document.getElementById('v-cat-badge').innerText = d.category;
         document.getElementById('v-emoji').innerText = d.emoji;
         document.getElementById('v-sw').innerText = d.sw;
         document.getElementById('v-en').innerText = d.en;
         document.getElementById('v-ja').innerText = d.ja;
      }

      function changeWord(step) {
         const list = vocabularyData.filter(d => d.level === currentLevel);
         vIndex = (vIndex + step + list.length) % list.length;
         updateWord();
      }

      function renderGrammar() {
         const area = document.getElementById('grammar-list');
         area.innerHTML = '';
         document.getElementById('g-lvl-badge').innerText = currentLevel;

         grammarData.filter(d => d.level === currentLevel).forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
               <div style="font-size:0.9rem; font-weight:bold; color:var(--secondary-color); margin-bottom:10px;">${item.title}</div>
               <div class="lang-row">
                  <div class="lang-label">Kiswahili</div>
                  <div class="lang-text"><span id="g-sw-${i}">${item.sw_phrase}</span><button class="btn-speak" onclick="speakGrammar('g-sw-${i}','sw')">🔊</button></div>
               </div>
               <div class="lang-row">
                  <div class="lang-label">English</div>
                  <div class="lang-text"><span id="g-en-${i}">${item.en_phrase}</span><button class="btn-speak" onclick="speakGrammar('g-en-${i}','en')">🔊</button></div>
               </div>
               <div class="lang-row">
                  <div class="lang-label">日本語</div>
                  <div class="lang-text"><span id="g-ja-${i}">${item.ja_trans}</span><button class="btn-speak" onclick="speakGrammar('g-ja-${i}','ja')">🔊</button></div>
               </div>
               <div style="font-size:0.9rem; margin-top:10px; color:#555;">${item.ja_explanation}</div>
            `;
            area.appendChild(div);
         });
      }

      function speak(lang) {
         const text = document.getElementById('v-' + lang).innerText;
         window.speechSynthesis.cancel();
         const u = new SpeechSynthesisUtterance(text);
         u.lang = (lang==='en')?'en-US':(lang==='ja')?'ja-JP':'sw-KE';
         window.speechSynthesis.speak(u);
      }

      function speakGrammar(id, lang) {
         const text = document.getElementById(id).innerText;
         window.speechSynthesis.cancel();
         const u = new SpeechSynthesisUtterance(text);
         u.lang = (lang==='en')?'en-US':(lang==='ja')?'ja-JP':'sw-KE';
         window.speechSynthesis.speak(u);
      }
	  function shuffleVocab() {
    // 1. 全体の単語データをバラバラに混ぜる
    vocabularyData.sort(() => Math.random() - 0.5);
    
    // 2. 最初の単語（0番目）に戻す
    currentVocabIndex = 0;
    
    // 3. 画面を更新する（既存の updateWord 関数を呼び出す）
    updateWord();
    
    // おまけ：混ぜたことが分かるように一瞬だけメッセージを出す
    const swElement = document.getElementById('v-sw');
    const originalText = swElement.innerText;
    swElement.innerText = "混ぜました！ 🔀";
    setTimeout(() => { updateWord(); }, 800);
}
